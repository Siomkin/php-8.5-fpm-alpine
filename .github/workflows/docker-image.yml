name: Build and Push Docker Image

on:
  push:
    tags:
      - v*
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

env:
  IMAGE_NAME: siomkin/8.5-fpm-alpine
  REGISTRY: docker.io
  DOCKER_BUILDKIT: 1

jobs:
  test-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image (Linux only - Development)
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: test-image:latest
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
          build-args: |
            TZ=UTC
            INSTALL_XDEBUG=true

      - name: Test PHP version and extensions
        run: |
          echo "Testing PHP version..."
          docker run --rm test-image:latest php -v

          echo "Testing PHP extensions..."
          docker run --rm test-image:latest sh -c "
            EXPECTED='bcmath exif gd gmp intl mysqli pcntl pdo_mysql pdo_pgsql redis sockets xsl zip xdebug'
            LOADED=\$(php -m)
            MISSING=''
            for ext in \$EXPECTED; do
              if ! echo \"\$LOADED\" | grep -qi \"^\$ext\$\"; then
                MISSING=\"\$MISSING \$ext\"
              fi
            done
            if [ -n \"\$MISSING\" ]; then
              echo \"ERROR: Missing extensions:\$MISSING\"
              exit 1
            fi
            echo 'All required extensions are loaded'
          "

          echo "Testing OPcache..."
          docker run --rm test-image:latest php -r "
            if (extension_loaded('Zend OPcache')) {
              echo 'OPcache is loaded\n';
            } else {
              echo 'ERROR: OPcache is not loaded\n';
              exit(1);
            }
          "

          echo "Testing Xdebug..."
          docker run --rm test-image:latest php -r "
            if (extension_loaded('xdebug')) {
              echo 'Xdebug is loaded\n';
              echo 'Xdebug version: ' . phpversion('xdebug') . '\n';
            } else {
              echo 'ERROR: Xdebug is not loaded\n';
              exit(1);
            }
          "

          echo "Testing PHP 8.5 features..."
          docker run --rm test-image:latest php -r "
            \$result = 'hello world' |> strtoupper(...) |> trim(...);
            echo 'Pipe operator works: ' . \$result . '\n';

            \$arr = [10, 20, 30];
            echo 'array_first: ' . array_first(\$arr) . '\n';
            echo 'array_last: ' . array_last(\$arr) . '\n';
          "

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: production
            xdebug: false
            tag_suffix: -prod
            cache_scope: prod
            title: "PHP 8.5 FPM Alpine Production"
            description: "PHP 8.5 FPM with common extensions (optimized for production, no Xdebug) on Alpine Linux"
          - variant: development
            xdebug: true
            tag_suffix: ""
            cache_scope: dev
            title: "PHP 8.5 FPM Alpine Development"
            description: "PHP 8.5 FPM with common extensions and Xdebug for development on Alpine Linux"
    outputs:
      version_tag: ${{ steps.version-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: version-tag
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          if [[ "$GIT_REF" =~ ^refs/tags/v(.*)$ ]]; then
            VERSION_TAG="${BASH_REMATCH[1]}"
          elif [[ "$GIT_REF" =~ ^refs/tags/(.*)$ ]]; then
            VERSION_TAG="${BASH_REMATCH[1]}"
          else
            VERSION_TAG="latest"
          fi
          echo "tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Version tag: ${VERSION_TAG}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=match,pattern=v(.*),group=1,suffix=${{ matrix.tag_suffix }}
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ github.ref == 'refs/heads/master' }}
            type=schedule,pattern={{date 'YYYYMMDD'}},suffix=${{ matrix.tag_suffix }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=siomkin
            maintainer=siomkin

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: true
          sbom: true
          build-args: |
            TZ=UTC
            INSTALL_XDEBUG=${{ matrix.xdebug }}

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: true
      matrix:
        variant: [production, development]
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image reference
        id: image-ref
        env:
          VERSION_TAG: ${{ needs.build.outputs.version_tag }}
          VARIANT: ${{ matrix.variant }}
        run: |
          if [ -z "$VERSION_TAG" ]; then
            echo "ERROR: Version tag is empty!"
            exit 1
          fi
          if [ "$VARIANT" == "production" ]; then
            IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}-prod"
          else
            IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}"
          fi
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE_REF"

      - name: Pull image
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image-ref }}
        run: |
          echo "Pulling image: $IMAGE_REF"
          docker pull "$IMAGE_REF"

      - name: Test suite
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image-ref }}
          VARIANT: ${{ matrix.variant }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "Starting test suite for $VARIANT image on $PLATFORM..."

          CONTAINER_ID=$(docker run -d --platform "$PLATFORM" "$IMAGE_REF")
          sleep 10

          echo "Testing PHP version..."
          docker exec "$CONTAINER_ID" php -v

          echo "Testing PHP extensions..."
          docker exec "$CONTAINER_ID" sh -c "
            EXPECTED='bcmath exif gd gmp intl mysqli pcntl pdo_mysql pdo_pgsql redis sockets xsl zip'
            LOADED=\$(php -m)
            MISSING=''
            for ext in \$EXPECTED; do
              if ! echo \"\$LOADED\" | grep -qi \"^\$ext\$\"; then
                MISSING=\"\$MISSING \$ext\"
              fi
            done
            if [ -n \"\$MISSING\" ]; then
              echo \"ERROR: Missing extensions:\$MISSING\"
              exit 1
            fi
            echo 'All required extensions are loaded'
          "

          echo "Testing OPcache..."
          docker exec "$CONTAINER_ID" php -r "
            if (extension_loaded('Zend OPcache')) {
              echo 'OPcache is loaded' . PHP_EOL;
            } else {
              echo 'ERROR: OPcache is not loaded' . PHP_EOL;
              exit(1);
            }
          "

          if [ "$VARIANT" == "production" ]; then
            echo "Verifying Xdebug is not in production..."
            docker exec "$CONTAINER_ID" sh -c "
              if php -m | grep -q '^xdebug$'; then
                echo 'ERROR: Xdebug should not be loaded in production image' >&2
                exit 1
              fi
              echo 'Xdebug is correctly absent from production'
            "
          else
            echo "Testing Xdebug..."
            docker exec "$CONTAINER_ID" php -r "
              if (extension_loaded('xdebug')) {
                echo 'Xdebug loaded - version: ' . phpversion('xdebug') . PHP_EOL;
              } else {
                echo 'ERROR: Xdebug is not loaded' . PHP_EOL;
                exit(1);
              }
            "
          fi

          echo "Testing PHP-FPM..."
          docker exec "$CONTAINER_ID" ps aux | grep php-fpm || exit 1
          docker exec "$CONTAINER_ID" php-fpm -t || exit 1

          echo "Testing user permissions..."
          docker exec "$CONTAINER_ID" sh -c "whoami && id" || exit 1

          echo "Testing timezone..."
          docker exec "$CONTAINER_ID" date || exit 1

          echo "Testing PHP 8.5 features..."
          docker exec "$CONTAINER_ID" php -r "
            \$result = 'hello world' |> strtoupper(...) |> trim(...);
            echo 'Pipe operator: ' . \$result . PHP_EOL;
            echo 'array_first: ' . array_first([10, 20, 30]) . PHP_EOL;
            echo 'array_last: ' . array_last([10, 20, 30]) . PHP_EOL;
          " || exit 1

          echo "All $VARIANT tests passed for $PLATFORM"

          docker stop "$CONTAINER_ID"
          docker rm "$CONTAINER_ID"

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: production
            suffix: -prod
          - variant: development
            suffix: ""

    steps:
      - name: Extract image reference
        id: image-ref
        env:
          VERSION_TAG: ${{ needs.build.outputs.version_tag }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}${SUFFIX}"
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE_REF"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.image-ref.outputs.image-ref }}
          version: 'v0.69.3'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.variant }}.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.variant }}.sarif'
          category: 'trivy-${{ matrix.variant }}'

      - name: Run Trivy for critical vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.image-ref.outputs.image-ref }}
          version: 'v0.69.3'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  benchmark:
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract image reference
        id: image-ref
        env:
          VERSION_TAG: ${{ needs.build.outputs.version_tag }}
        run: |
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${VERSION_TAG}-prod"
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE_REF"

      - name: Run basic performance test
        env:
          IMAGE_REF: ${{ steps.image-ref.outputs.image-ref }}
        run: |
          echo "Running basic PHP performance test..."
          docker run --rm --platform linux/amd64 "$IMAGE_REF" \
            php -r "
              \$start = microtime(true);
              for(\$i = 0; \$i < 1000000; \$i++) {
                \$x = \$i * 2;
              }
              \$end = microtime(true);
              echo 'Execution time: ' . (\$end - \$start) . ' seconds\n';
            "

      - name: Performance summary
        run: |
          echo "## Performance Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build Strategy:** Single-stage build with conditional Xdebug and optimized layer caching" >> "$GITHUB_STEP_SUMMARY"
          echo "**Test Execution:** Matrix testing across prod/dev variants and architectures" >> "$GITHUB_STEP_SUMMARY"

  release-notification:
    needs: [build, test, security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Create release summary
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## Docker Image Release Summary"
            echo ""
            echo "**Image:** \`${REGISTRY}/${IMAGE_NAME}\`"
            echo "**Tag:** \`${REF_NAME}\`"
            echo "**Platforms:** linux/amd64, linux/arm64"
            echo ""
            echo "### Completed Checks"
            echo "- Multi-platform build (production and development)"
            echo "- Security vulnerability scanning (Trivy)"
            echo "- Comprehensive functionality tests"
            echo "- PHP extensions verification"
            echo "- FPM process validation"
            echo "- Xdebug configuration (development only)"
            echo "- PHP 8.5 features validation (pipe operator, array_first/array_last)"
            echo ""
            echo "### Available Images"
            echo ""
            echo "**Production (without Xdebug):**"
            echo "\`\`\`"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${REF_NAME}-prod"
            echo "\`\`\`"
            echo ""
            echo "**Development (with Xdebug):**"
            echo "\`\`\`"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${REF_NAME}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
